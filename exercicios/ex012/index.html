<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos em HTML5</title>
</head>
<body>
   <h1>Inserindo vídeos hospedado localmente</h1> 
   <p>Este vídeo está hospedado no meu próprio servidor.</p>
   <video width="500" height="700" controls autoplay loop>
       <source src="midea/meu-video.mp4" type="video/mp4">
       Seu navegador não suporta a tag de vídeo.

   </video>
   <h1>Inserindo vídeo do YouTube</h1>
   <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/uh2OfiyH7Eg?start=7" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
   
</body>
</html>
